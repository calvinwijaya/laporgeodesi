<div class="container-fluid py-2">
    <div class="card shadow-sm border-0 rounded-4">
        <div class="card-header bg-danger text-white rounded-top-4 p-3">
            <h4 class="mb-0 fw-bold"><i class="bi bi-exclamation-triangle-fill me-2"></i>Lakukan Pengaduan</h4>
            <small class="ms-4 text-light">Lakukan pelaporan pelanggaran pada halaman ini!</small>
        </div>
        <div class="card-body p-4 bg-white">
            
            <div class="alert alert-warning border-warning shadow-sm d-flex align-items-center mb-4" role="alert">
                <i class="bi bi-shield-lock-fill fs-3 me-3 text-warning"></i>
                <div>
                    <strong>PENTING:</strong> Identitas pelapor <strong>TIDAK</strong> akan kami simpan di sistem, sehingga privasi Anda tetap terjaga!
                </div>
            </div>

            <form id="formBuatAduan">
                <div class="row mb-3">
                    <div class="col-md-12">
                        <label class="form-label fw-bold text-secondary">Cari Nama Pelanggar</label>
                        <input class="form-control border-danger" list="listMahasiswa" id="srNamaPelanggar" required placeholder="Ketik nama atau NIM untuk mencari...">
                        <datalist id="listMahasiswa">
                            </datalist>
                        <div class="form-text text-muted small"><i class="bi bi-info-circle me-1"></i>Pilih dari daftar. Format: [NIM] - [Nama]</div>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold text-secondary">Tanggal Pelanggaran</label>
                        <input type="date" class="form-control fw-bold text-danger" id="srTanggal" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold text-secondary">Jenis Pelanggaran</label>
                        <select class="form-select" id="srJenis" required>
                            <option value="" disabled selected>Pilih jenis pelanggaran...</option>
                            <option value="Terlambat mengikuti ujian">Terlambat mengikuti ujian</option>
                            <option value="Titip absen">Titip absen</option>
                            <option value="Pemalsuan (dokumen/ TTD)">Pemalsuan (dokumen/ TTD)</option>
                            <option value="Melakukan kekerasan (verbal/non-verbal)">Melakukan kekerasan (verbal/non-verbal)</option>
                            <option value="Mencontek">Mencontek</option>
                            <option value="Lain lain">Lain-lain</option>
                        </select>
                    </div>
                </div>

                <div class="mb-3 d-none" id="wrapperUjianAduan">
                    <label class="form-label fw-bold text-secondary">Ujian Apa?</label>
                    <select class="form-select border-danger" id="srUjian">
                        <option value="" disabled selected>Pilih jenis ujian...</option>
                        <option value="UTS Genap 25/26">UTS Genap 25/26</option>
                        <option value="UAS Genap 25/26">UAS Genap 25/26</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold text-secondary">Keterangan Pelanggaran</label>
                    <textarea class="form-control" id="srKeterangan" rows="4" required placeholder="Ceritakan kronologi kejadian yang Anda lihat atau ketahui..."></textarea>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold text-secondary">Link Dokumentasi / Bukti <span class="text-danger">*</span></label>
                    <input type="url" class="form-control" id="srLink" required placeholder="Masukkan link Google Drive foto/video bukti kejadian (Wajib)">
                </div>

                <div class="d-grid mt-2">
                    <button type="submit" class="btn btn-danger btn-lg fw-bold shadow-sm">
                        <i class="bi bi-send-fill me-2"></i>Kirim Laporan Pengaduan!
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

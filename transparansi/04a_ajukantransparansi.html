<div class="container-fluid py-3">
    <div class="card shadow-sm border-0 rounded-4">
        <div class="card-header bg-primary text-white rounded-top-4 p-3">
            <h4 class="mb-0 fw-bold"><i class="bi bi-file-earmark-check-fill me-2"></i>Pengajuan Transparansi Nilai</h4>
            <small class="ms-4 text-light">Mata Kuliah DTGD FT UGM</small>
        </div>
        <div class="card-body p-4 bg-white">
            <form id="formTransparansi">
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold text-secondary">Nama Lengkap</label>
                        <input type="text" class="form-control bg-light" id="trNama" readonly>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold text-secondary">NIM</label>
                        <input type="text" class="form-control bg-light" id="trNim" readonly>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-8">
                        <label class="form-label fw-bold text-secondary">Mata Kuliah</label>
                        <input class="form-control" list="listMatkul" id="trMatkul" required placeholder="Ketik kode atau nama MK...">
                        <datalist id="listMatkul">
                            </datalist>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold text-secondary">Kelas</label>
                        <select class="form-select" id="trKelas" required>
                            <option value="" disabled selected>Pilih kelas...</option>
                            <option value="A">A</option>
                            <option value="B">B</option>
                            <option value="C">C</option>
                            <option value="IUP">IUP</option>
                        </select>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold text-secondary">Dosen Pengampu</label>
                    <input class="form-control" list="listDosen" id="trDosen" required placeholder="Ketik nama dosen...">
                    <datalist id="listDosen">
                        </datalist>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold text-secondary">Hal yang dikonfirmasi</label>
                    <textarea class="form-control" id="trHal" rows="3" required placeholder="Contoh: Konfirmasi nilai akhir..."></textarea>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold text-secondary">Alasan yang mendasari</label>
                    <textarea class="form-control" id="trAlasan" rows="3" required placeholder="Jelaskan alasan pengajuan transparansi Anda secara sopan dan jelas..."></textarea>
                </div>

                <div class="card bg-light border-0 mb-4 p-3 rounded-3">
                    <div class="form-check mb-3">
                        <input class="form-check-input" type="checkbox" id="trConsent" required>
                        <label class="form-check-label fw-bold" for="trConsent">
                            Apakah Anda yakin mengajukan transparansi nilai ini dengan itikad baik?
                        </label>
                    </div>
                    <div class="d-flex align-items-center">
                        <label class="form-label mb-0 fw-bold text-secondary me-3" id="captchaQuestion">Berapa hasil dari ...?</label>
                        <input type="number" class="form-control form-control-sm w-25" id="trCaptcha" required placeholder="Jawab">
                    </div>
                </div>

                <div class="d-grid mt-2">
                    <button type="submit" class="btn btn-primary btn-lg fw-bold shadow-sm">
                        <i class="bi bi-send-fill me-2"></i>Ajukan Transparansi
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
